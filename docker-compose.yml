version: '3'

services:

  web:
    build: .
    ports:
      - "5000:5000"

    depends_on:
      - db

  db:
    image: mysql:5.7

    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: devops_db

    ports:
      - "3307:3306"

    volumes:
      - mysql-data:/var/lib/mysql

volumes:
  mysql-data: